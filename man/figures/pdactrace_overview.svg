<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700"
     font-family="Helvetica, Arial, sans-serif" fill="#1A1A1A">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#424242"/>
    </marker>
    <style><![CDATA[
      .box      { stroke-width: 1.2; }
      .input    { fill: #EEF2F7; stroke: #90A4AE; }
      .process  { fill: #FFFFFF; stroke: #90A4AE; }
      .surface  { fill: #E8F5E9; stroke: #66BB6A; }
      .audit    { fill: #FFF8E1; stroke: #FFC107; }
      .output   { fill: #F5F5F5; stroke: #757575; }
      .title    { font-size: 15px; font-weight: 600; fill: #1A1A1A; }
      .subtitle { font-size: 12px; fill: #4A4A4A; }
      .small    { font-size: 11px; fill: #5A5A5A; }
      .header   { font-size: 13px; font-weight: 600; fill: #2A2A2A;
                  letter-spacing: 0.3px; }
      .arrow    { stroke: #424242; stroke-width: 1.5; fill: none; }
    ]]></style>
  </defs>

  <!-- Header -->
  <text x="450" y="28" text-anchor="middle" class="header">
    pdactrace — stage-aware multi-omics biomarker audit framework
  </text>

  <!-- Row 1: two parallel inputs -->
  <rect class="box input"   x="80"  y="55" width="320" height="80" rx="6"/>
  <text x="240" y="85"  text-anchor="middle" class="title">User staged omics</text>
  <text x="240" y="105" text-anchor="middle" class="subtitle">
    counts / intensity matrix
  </text>
  <text x="240" y="122" text-anchor="middle" class="small">
    + stage labels (Normal / Early / Mid / Late) + cohort
  </text>

  <rect class="box input"   x="500" y="55" width="320" height="80" rx="6"/>
  <text x="660" y="85"  text-anchor="middle" class="title">Bundled atlas</text>
  <text x="660" y="105" text-anchor="middle" class="subtitle">
    pdactrace_reference: 10,113 genes × 113 columns
  </text>
  <text x="660" y="122" text-anchor="middle" class="small">
    11 RNA + 3 protein + 10 scRNA + 3 serum cohorts
  </text>

  <!-- Converging arrows from both inputs -->
  <path class="arrow" d="M 240 135 C 240 160, 450 160, 450 175"
        marker-end="url(#arrow)"/>
  <path class="arrow" d="M 660 135 C 660 160, 450 160, 450 175"
        marker-end="url(#arrow)"/>

  <!-- Row 2: 12-template trajectory matching -->
  <rect class="box process" x="200" y="180" width="500" height="70" rx="6"/>
  <text x="450" y="208" text-anchor="middle" class="title">
    12-template trajectory matching
  </text>
  <text x="450" y="228" text-anchor="middle" class="subtitle">
    Early × 4 + Mid × 4 + Late × 2 + Monotonic × 2 (Pearson ρ ≥ 0.85)
  </text>

  <line class="arrow" x1="450" y1="250" x2="450" y2="275"
        marker-end="url(#arrow)"/>

  <!-- Row 3: Early × 4 atlas surface (highlighted) -->
  <rect class="box surface" x="120" y="275" width="660" height="80" rx="6"/>
  <text x="450" y="303" text-anchor="middle" class="title">
    Early × 4 atlas surface
  </text>
  <text x="450" y="322" text-anchor="middle" class="subtitle">
    Early_Burst_Up · Early_Loss_Down · Early_Peak · Early_Trough
  </text>
  <text x="450" y="341" text-anchor="middle" class="small">
    non-Early best-matches surfaced as excluded_mid / excluded_late /
    excluded_monotonic flags
  </text>

  <line class="arrow" x1="450" y1="355" x2="450" y2="380"
        marker-end="url(#arrow)"/>

  <!-- Row 4: Multi-layer evidence -->
  <rect class="box process" x="120" y="380" width="660" height="60" rx="6"/>
  <text x="450" y="406" text-anchor="middle" class="title">
    Multi-layer evidence
  </text>
  <text x="450" y="425" text-anchor="middle" class="subtitle">
    RNA · Protein · scRNA cell origin · Serum direction · Pancreatitis context
  </text>

  <line class="arrow" x1="450" y1="440" x2="450" y2="465"
        marker-end="url(#arrow)"/>

  <!-- Row 5: Audit score (highlighted) -->
  <rect class="box audit" x="120" y="465" width="660" height="80" rx="6"/>
  <text x="450" y="493" text-anchor="middle" class="title">
    3-axis + 2-gate audit score (frozen, deterministic)
  </text>
  <text x="450" y="513" text-anchor="middle" class="subtitle">
    (0.40·evidence_strength + 0.35·biological_coherence +
    0.25·translational_relevance) × leakage_gate × heterogeneity_gate
  </text>
  <text x="450" y="531" text-anchor="middle" class="small">
    audit_class ∈ { high_confidence · supported_uncertain · penalized · excluded · low }
  </text>

  <line class="arrow" x1="450" y1="545" x2="450" y2="570"
        marker-end="url(#arrow)"/>

  <!-- Row 6: User-facing functions -->
  <rect class="box output" x="80" y="570" width="740" height="100" rx="6"/>
  <text x="450" y="595" text-anchor="middle" class="title">
    Auditable, reusable outputs
  </text>
  <text x="450" y="618" text-anchor="middle" class="subtitle">
    query_gene · query_panel · compare_candidates · explain_score
  </text>
  <text x="450" y="638" text-anchor="middle" class="subtitle">
    report_gene (HTML) · align_patient_profile · trace_filters
  </text>
  <text x="450" y="658" text-anchor="middle" class="small">
    Bioconductor-native:  fit_stage_de(SummarizedExperiment) ·
    as_summarized_experiment()
  </text>
</svg>
