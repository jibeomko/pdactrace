on:
  push:
    branches: [main, master]
    paths:
      - "DESCRIPTION"
      - "NAMESPACE"
      - "R/**"
      - "tests/**"
      - "data/**"
      - "inst/**"
      - "man/**"
      - "vignettes/**"
      - ".github/workflows/R-CMD-check.yaml"
  pull_request:
    branches: [main, master]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'devel', http-user-agent: 'release'}
          # macOS-arm64 runner has unstable Bioconductor package init
          # ("irrecoverable exception" on requireNamespace('DESeq2')
          # despite setup-r-dependencies@v2 reporting success). The
          # Bioconductor build farm uses Linux for releases, so the
          # Linux matrix above is the contract. Re-add macOS once
          # r-lib/actions resolves the arm64 Bioc init flakiness.

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
